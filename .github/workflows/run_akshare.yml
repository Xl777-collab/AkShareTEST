name: A股收盘复盘自动化

on:
  workflow_dispatch: 

jobs:
  build-and-run:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 增加了 openai 库的安装
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas tabulate openai

      # 把环境变量（API Key）传给 Python 脚本
      - name: Run main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

name: A股收盘复盘自动化

on:
  workflow_dispatch: 

# ====== 重点：必须增加这两行权限，否则机器人无法把文件写进你的仓库 ======
permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas tabulate openai

      - name: Run main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      # ====== 新增步骤：把生成的 Markdown 文件自动提交到仓库 ======
      - name: Commit and push generated report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.md
          # 检查是否有新文件，有的话就提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI 自动生成今日量化复盘报告" && git push)

      # 把环境变量（API Key）传给 Python 脚本
      - name: Run main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

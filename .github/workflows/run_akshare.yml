name: A股收盘复盘自动化

on:
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas tabulate openai markdown xhtml2pdf

      - name: Run main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
        run: python main.py

      - name: Commit and push generated report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.md *.pdf
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI 自动生成量化研报" && git push)
